name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependency
        run: python -m pip install black

      - name: Check formatting
        run: make lint

      - name: Run tests
        run: make test

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build add-on
        run: ./build.sh "${GITHUB_REF_NAME#v}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/anki_slot_machine.ankiaddon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to AnkiWeb
        uses: lmallez/anki-addon-publish-action@v0.1.1
        with:
          file: dist/anki_slot_machine.ankiaddon
          anki-user: ${{ secrets.ANKI_USER }}
          anki-password: ${{ secrets.ANKI_PASSWORD }}
          id: ${{ vars.ANKI_ADDON_ID }}
          name: "[BETA] 🎰 Anki Slot Machine"
          support-page: https://github.com/${{ github.repository }}
          tags: games
          description-file: src/anki_slot_machine/README.md
